version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: claywords_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux 兼容
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: claywords_grafana
    ports:
      - "3001:3000"  # 改为 3001 避免与前端冲突
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: claywords_admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - monitoring

  # Optional: Alertmanager
  # alertmanager:
  #   image: prom/alertmanager:latest
  #   container_name: claywords_alertmanager
  #   ports:
  #     - "9093:9093"
  #   volumes:
  #     - ./alertmanager:/etc/alertmanager
  #   networks:
  #     - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
