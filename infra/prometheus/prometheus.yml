global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ClayWords Backend
  - job_name: 'claywords-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'backend'
          env: 'dev'

  # Redis Exporter (optional)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'

  # Postgres Exporter (optional)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: 'postgres'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add Alertmanager URLs here when configured

# Rule files
rule_files:
  - "/etc/prometheus/rules/*.yml"
