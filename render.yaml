services:
  # 后端 + 前端同源托管（单 Docker Web 服务）
  # 数据库/Redis 使用外部免费托管服务（Neon / Upstash），
  # 连接串在下方 sync:false 的环境变量里手动填入。
  - type: web
    name: claywords
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      # 外部 Postgres（Neon）连接串，形如 postgresql://user:pass@host/db?sslmode=require
      - key: DATABASE_URL
        sync: false
      # 外部 Redis（Upstash）连接串，形如 rediss://default:pass@host:port
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CRYPTO_PEPPER
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: tongyi
      - key: TONGYI_API_KEY
        sync: false
