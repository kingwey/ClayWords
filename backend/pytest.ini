[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async tests
asyncio_mode = auto

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=70

# Markers
markers =
    unit: 单元测试
    integration: 集成测试（需要真实数据库）
    slow: 慢速测试
    smoke: 烟雾测试
    e2e: 端到端测试

# Coverage (when --cov is added)
[coverage:run]
source = app
omit =
    */tests/*
    */alembic/*
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
