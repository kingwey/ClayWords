[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async tests
asyncio_mode = auto

# Output
# 注: --cov-fail-under 当前 45%(实测 ~48%)。这是诚实的当前覆盖,而非目标。
# 后续按 docs/project-analysis-2026-06-23.md 第十节计划逐步上调:
#   45% (现在) -> 60% -> 70% -> 80%
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=45

# Markers
markers =
    unit: 单元测试
    integration: 集成测试（需要真实数据库）
    slow: 慢速测试
    smoke: 烟雾测试
    e2e: 端到端测试

# Coverage (when --cov is added)
[coverage:run]
source = app
omit =
    */tests/*
    */alembic/*
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
